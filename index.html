<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ledger — Finance Tracker</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --bg:#F7F7F4;
  --surface:#FFFFFF;
  --surface-alt:#F0F4F2;
  --ink:#0F172A;
  --ink-soft:#5B6472;
  --ink-faint:#94A0AC;
  --teal:#0D9488;
  --teal-dark:#0A7A70;
  --teal-tint:#E3F5F2;
  --amber:#C2760C;
  --amber-tint:#FBF0DD;
  --red:#C0362C;
  --red-tint:#FBEAE8;
  --border:#E4E7E5;
  --nav-bg:rgba(255,255,255,.92);
  --brand-mark-bg:#0F172A;
  --brand-mark-fg:#FFFFFF;
  --primary-btn-bg:#0F172A;
  --primary-btn-fg:#FFFFFF;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.10);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#101412;
  --surface:#171C1A;
  --surface-alt:#222A27;
  --ink:#F3F7F5;
  --ink-soft:#B6C0BB;
  --ink-faint:#7F8B86;
  --teal:#2DD4BF;
  --teal-dark:#5EEAD4;
  --teal-tint:#123A36;
  --amber:#F0B45A;
  --amber-tint:#3D2B14;
  --red:#F87171;
  --red-tint:#3D1D1D;
  --border:#2A3430;
  --nav-bg:rgba(23,28,26,.92);
  --brand-mark-bg:#F3F7F5;
  --brand-mark-fg:#101412;
  --primary-btn-bg:#2DD4BF;
  --primary-btn-fg:#06201D;
  --shadow:0 1px 2px rgba(0,0,0,.28), 0 10px 28px -14px rgba(0,0,0,.70);
}
#print-area{display:none;}
*{box-sizing:border-box;}
html{overscroll-behavior:none;}
body{overscroll-behavior:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;}
input,textarea{-webkit-touch-callout:default;}
.ledger-banner{
  position:fixed;left:10px;right:10px;top:calc(10px + env(safe-area-inset-top));z-index:60;
  display:none;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);
}
.ledger-banner.show{display:flex;}
.ledger-banner .lb-icon{width:30px;height:30px;border-radius:9px;background:var(--teal-tint);color:var(--teal-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ledger-banner .lb-body{flex:1;min-width:0;}
.ledger-banner .lb-title{font-weight:600;font-size:13.5px;}
.ledger-banner .lb-text{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}
.ledger-banner .lb-close{background:none;border:none;color:var(--ink-faint);flex-shrink:0;padding:2px;}
.chat-bubble{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;}
.chat-bubble.user{align-self:flex-end;background:var(--primary-btn-bg);color:var(--primary-btn-fg);border-bottom-right-radius:4px;}
.chat-bubble.ai{align-self:flex-start;background:var(--surface-alt);color:var(--ink);border-bottom-left-radius:4px;}
.ai-typing{opacity:.65;font-style:italic;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}
h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* ---------- Layout shells ---------- */
#app{min-height:100dvh;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(16px + env(safe-area-inset-top)) 18px 16px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;background:var(--brand-mark-bg);
  display:flex;align-items:center;justify-content:center;color:var(--brand-mark-fg);font-weight:700;font-family:'Space Grotesk';
  flex-shrink:0;
}
.brand-name{font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:-.01em;}
.icon-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex-shrink:0;
  transition:background .15s;
}
.icon-btn:active{background:var(--surface-alt);}

.page-wrap{padding:0 16px 100px;max-width:1200px;margin:0 auto;}
.section-title{font-size:13px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin:22px 2px 10px;}
.section-title.first{margin-top:6px;}

/* Bottom nav (mobile app feel) */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;
  background:var(--nav-bg);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index:40;
}
.nav-btn{
  background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--ink-faint);font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:10px;
}
.nav-btn.active{color:var(--teal);}
.nav-btn svg{width:21px;height:21px;}

/* Desktop sidebar */
.desktop-shell{display:none;}
@media (min-width:900px){
  .mobile-shell{display:none;}
  .desktop-shell{display:flex;min-height:100dvh;}
  .sidebar{
    width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 14px;gap:2px;position:sticky;top:0;height:100dvh;
  }
  .sidebar .brand{padding:6px 8px 22px;}
  .side-link{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;color:var(--ink-soft);
    font-weight:600;font-size:14px;border:none;background:none;text-align:left;width:100%;
  }
  .side-link svg{width:19px;height:19px;flex-shrink:0;}
  .side-link.active{background:var(--teal-tint);color:var(--teal-dark);}
  .side-link:hover:not(.active){background:var(--surface-alt);}
  .desktop-main{flex:1;min-width:0;padding:28px 36px 60px;max-width:1180px;}
  .desktop-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .page-wrap{display:none;}
  .bottomnav{display:none;}
  .topbar{display:none;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
  .grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
}
@media (max-width:899px){
  .desktop-shell{display:none;}
}

/* ---------- Cards / components ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;box-shadow:var(--shadow);
}
.grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:14px 14px;
}
.stat-label{font-size:12px;color:var(--ink-faint);font-weight:600;margin-bottom:6px;}
.stat-value{font-size:19px;font-weight:600;letter-spacing:-.01em;}
.stat-value.pos{color:var(--teal-dark);}
.stat-value.neg{color:var(--red);}
.pill{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;
}
.pill.teal{background:var(--teal-tint);color:var(--teal-dark);}
.pill.amber{background:var(--amber-tint);color:var(--amber);}
.pill.red{background:var(--red-tint);color:var(--red);}
.pill.gray{background:var(--surface-alt);color:var(--ink-soft);}

.period-switch{
  display:flex;background:var(--surface-alt);border-radius:11px;padding:3px;gap:2px;
}
.period-switch button{
  border:none;background:none;padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--ink-soft);
}
.period-switch button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}

.list-row{
  display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border);
}
.list-row:last-child{border-bottom:none;}
.row-icon{
  width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.row-main{flex:1;min-width:0;}
.row-title{font-weight:600;font-size:14.5px;}
.row-sub{font-size:12px;color:var(--ink-faint);margin-top:1px;}
.row-amt{font-weight:600;font-size:14.5px;text-align:right;white-space:nowrap;}
.row-amt.income{color:var(--teal-dark);}
.row-amt.expense{color:var(--ink);}

.fab{
  position:fixed;right:18px;bottom:84px;width:56px;height:56px;border-radius:18px;
  background:var(--primary-btn-bg);color:var(--primary-btn-fg);border:none;display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px -8px rgba(15,23,42,.45);z-index:41;
}
@media (min-width:900px){.fab{display:none;}}
.btn{
  border:none;border-radius:12px;padding:11px 16px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;
}
.btn-primary{background:var(--primary-btn-bg);color:var(--primary-btn-fg);}
.btn-secondary{background:var(--surface-alt);color:var(--ink);}
.btn-danger{background:var(--red-tint);color:var(--red);}
.btn-block{width:100%;justify-content:center;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px;}

.empty{
  text-align:center;padding:40px 20px;color:var(--ink-faint);
}
.empty svg{width:38px;height:38px;margin-bottom:10px;opacity:.5;}
.empty-title{font-weight:600;color:var(--ink-soft);margin-bottom:4px;font-size:14.5px;}

.progress-track{height:8px;border-radius:99px;background:var(--surface-alt);overflow:hidden;margin-top:9px;}
.progress-fill{height:100%;border-radius:99px;transition:width .3s;}

.banner{
  display:flex;align-items:flex-start;gap:10px;border-radius:14px;padding:12px 14px;margin-bottom:12px;
}
.banner svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;}
.banner-text{font-size:13px;font-weight:500;line-height:1.4;}
.banner.warn{background:var(--amber-tint);color:#8a5a08;}
.banner.danger{background:var(--red-tint);color:#8f2b23;}
.banner.info{background:var(--teal-tint);color:var(--teal-dark);}

.swatch{width:26px;height:26px;border-radius:8px;border:2px solid transparent;flex-shrink:0;}
.swatch.selected{border-color:var(--ink);}
.chip{
  display:inline-flex;align-items:center;padding:8px 12px;border-radius:10px;background:var(--surface-alt);
  font-size:13px;font-weight:600;border:2px solid transparent;
}
.chip.selected{border-color:var(--ink);background:var(--surface);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--border);font-size:14.5px;background:var(--surface);color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:-1px;}
.field textarea{resize:vertical;min-height:118px;line-height:1.45;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-toggle button{
  flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:13.5px;color:var(--ink-soft);
}
.type-toggle button.active.income{border-color:var(--teal);background:var(--teal-tint);color:var(--teal-dark);}
.type-toggle button.active.expense{border-color:var(--ink);background:var(--surface-alt);color:var(--ink);}
.form-actions{display:flex;gap:8px;align-items:center;}
.form-actions .btn{flex:1;justify-content:center;}
.parse-preview{
  border:1px solid var(--border);border-radius:14px;background:var(--surface-alt);padding:12px;margin-bottom:14px;
}
.parse-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.parse-item{min-width:0;}
.parse-label{font-size:11.5px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.parse-value{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parse-message{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:10px;}
.message-box{
  white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:14px;
  background:var(--surface-alt);padding:13px;font-size:13px;line-height:1.5;color:var(--ink-soft);
}
.row-flex{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tiny-btn{border:none;background:none;color:var(--ink-faint);padding:6px;border-radius:8px;display:flex;}
.tiny-btn:active{background:var(--surface-alt);}

/* Modal / sheet */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:flex-end;justify-content:center;z-index:100;
}
.overlay.show{display:flex;}
@media (min-width:900px){.overlay{align-items:center;}}
.sheet{
  background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  animation:slideup .22s ease;
}
@media (min-width:900px){.sheet{border-radius:22px;max-height:82vh;}}
@keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sheet-title{font-family:'Space Grotesk';font-weight:700;font-size:18px;}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:18px;}
.legend{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.legend-name{flex:1;color:var(--ink-soft);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.legend-val{font-weight:600;}

.insight-card{
  border-radius:16px;padding:14px;background:var(--surface);border:1px solid var(--border);margin-bottom:10px;
  display:flex;gap:11px;align-items:flex-start;
}
.insight-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight-title{font-weight:600;font-size:13.5px;margin-bottom:3px;}
.insight-body{font-size:12.5px;color:var(--ink-soft);line-height:1.45;}

.tabbar-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:4px;}
.tabbar-scroll::-webkit-scrollbar{display:none;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div id="app"></div>
<div class="ledger-banner" id="ledgerBanner"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div id="print-area"></div>

<script>
/* ============ MEDIAN / NATIVE APP BRIDGE ============ */
// Median (and legacy GoNative) inject a small "median" string into the user-agent
// and, at runtime, a global `median` object with native bridge functions. Detect
// both so this same file works unmodified in a regular browser, as an installed
// PWA, and wrapped by Median.
const isMedianApp = /median|gonative/i.test(navigator.userAgent);
function medianBridge(){ return (typeof median !== 'undefined' && median) ? median : null; }

// Copy text to the clipboard. Uses Median's native clipboard bridge when running
// inside the wrapped app (more reliable there than the web Clipboard API, which
// some WebViews restrict), falling back to the standard web APIs otherwise.
async function copyText(text){
  const bridge = medianBridge();
  if(bridge?.clipboard?.set){
    try{ bridge.clipboard.set({data:text}); return; }catch(e){}
  }
  if(navigator.clipboard?.writeText){
    try{ await navigator.clipboard.writeText(text); return; }catch(e){}
  }
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly','');
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  const ok = document.execCommand('copy');
  textarea.remove();
  if(!ok) throw new Error('Copy failed');
}

// True when some form of "share to another app" is available.
function canSystemShare(){ return !!navigator.share || !!medianBridge()?.share?.sharePage; }
async function systemShare({title, text, url}){
  if(navigator.share){ return navigator.share({title, text, url}); }
  const bridge = medianBridge();
  if(bridge?.share?.sharePage){ return bridge.share.sharePage({url: url||undefined, text}); }
  throw new Error('Sharing is not available on this device.');
}

/* ============ ICONS ============ */

  wallet:'<path d="M3 7a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v3"/><path d="M3 7v11a2 2 0 0 0 2 2h14a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1H15a2 2 0 0 0 0 4h5"/>',
  briefcase:'<rect x="3" y="7.5" width="18" height="12" rx="2"/><path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"/><line x1="3" y1="12.5" x2="21" y2="12.5"/>',
  zap:'<path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/>',
  bulb:'<path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.7.7 1 1.3 1 2.5h6c0-1.2.3-1.8 1-2.5A6 6 0 0 0 12 3Z"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.56V21a2 2 0 0 1-4 0v-.09a1.7 1.7 0 0 0-1-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1H3a2 2 0 0 1 0-4h.09a1.7 1.7 0 0 0 1.56-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.56V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.56 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.56 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1Z"/>',

function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return Math.abs(h); }
function guessCategoryIcon(name, type){
  const n = (name||'').toLowerCase();
  for(const rule of CAT_ICON_RULES){
    if(rule.keys.some(k=>n.includes(k))) return rule.icon;
  }
  if(!n) return type==='income' ? 'wallet' : 'receipt';
  return CAT_ICON_FALLBACK_POOL[hashStr(n) % CAT_ICON_FALLBACK_POOL.length];
}
function guessCategoryColor(){
  const counts = CAT_COLORS.map(()=>0);
  (state?.categories||[]).forEach(c=>{
    const idx = CAT_COLORS.indexOf(c.color);
    if(idx>=0) counts[idx]++;
  });
  let minIdx = 0;
  for(let i=1;i<counts.length;i++) if(counts[i]<counts[minIdx]) minIdx = i;
  return CAT_COLORS[minIdx];
}

/* ============ NOTIFICATIONS ============ */
const NOTIF_ENABLED_KEY = 'ledger-notif-enabled-v1';
const NOTIF_LAST_REMINDER_KEY = 'ledger-last-reminder-date-v1';
const NOTIF_BUDGET_ALERTS_KEY = 'ledger-notified-budgets-v1';

// Regular Android/iOS WebViews (which is what a Median-wrapped app runs inside)
// do not implement the web Notification API or Web Push at all — there's no
// permission prompt and no OS-level delivery. So system notifications only work
// when this page is opened directly in a real desktop/mobile browser (or a PWA
// installed straight from one). Inside the wrapped app we still want reminders
// to work, so we always show an in-app banner as a reliable fallback that
// requires no permission and works identically everywhere.
function notificationsSupported(){ return !isMedianApp && 'Notification' in window; }
function notifPermission(){ return notificationsSupported() ? Notification.permission : 'unsupported'; }
function notifEnabled(){ return localStorage.getItem(NOTIF_ENABLED_KEY)==='true'; }
function systemNotifEnabled(){ return notifEnabled() && notifPermission()==='granted'; }

async function enableNotifications(){
  if(notificationsSupported()){
    let perm = Notification.permission;
    if(perm==='default') perm = await Notification.requestPermission();
    if(perm==='denied'){
      alert('Notifications were blocked. To enable reminders, allow notifications for this site in your browser/device settings.');
      renderSettingsBody();
      return;
    }
    let reg = null;
    if('serviceWorker' in navigator){
      try{ reg = await navigator.serviceWorker.register('./sw.js'); }catch(e){}
    }
    if(reg && 'periodicSync' in reg){
      try{
        const status = await navigator.permissions.query({name:'periodic-background-sync'});
        if(status.state==='granted'){
          await reg.periodicSync.register('ledger-daily-reminder', {minInterval: 20*60*60*1000});
        }
      }catch(e){}
    }
  }
  localStorage.setItem(NOTIF_ENABLED_KEY,'true');
  showLedgerNotification('Ledger reminders are on', isMedianApp
    ? "You'll see a banner in the app for budget alerts and daily reminders."
    : "You'll get reminders and budget alerts on this device.");
  checkFinanceReminders();
  renderSettingsBody();
}
function disableNotifications(){
  localStorage.setItem(NOTIF_ENABLED_KEY,'false');
  hideLedgerBanner();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistration('./sw.js').then(reg=>{
      if(reg && reg.periodicSync) reg.periodicSync.unregister('ledger-daily-reminder').catch(()=>{});
    }).catch(()=>{});
  }
  renderSettingsBody();
}
function toggleNotifications(){ notifEnabled() ? disableNotifications() : enableNotifications(); }

// In-app banner: a small dismissible card pinned to the top of the screen.
// Lives outside the #app tree (which render() fully replaces) so it survives
// re-renders untouched.
let bannerHideTimer = null;
function showLedgerBanner(title, body){
  const el = document.getElementById('ledgerBanner');
  if(!el) return;
  el.innerHTML = `
    <div class="lb-icon">${icon('bell',16)}</div>
    <div class="lb-body">
      <div class="lb-title">${escapeHTML(title)}</div>
      <div class="lb-text">${escapeHTML(body)}</div>
    </div>
    <button class="lb-close" onclick="hideLedgerBanner()">${icon('x',15)}</button>
  `;
  el.classList.add('show');
  if(bannerHideTimer) clearTimeout(bannerHideTimer);
  bannerHideTimer = setTimeout(hideLedgerBanner, 8000);
}
function hideLedgerBanner(){
  const el = document.getElementById('ledgerBanner');
  if(el) el.classList.remove('show');
}

function showLedgerNotification(title, body, tag){
  if(!notifEnabled()) return;
  // Always surface the in-app banner — it works whether this is a browser tab,
  // an installed PWA, or wrapped by Median, and needs no permission.
  if(!document.hidden) showLedgerBanner(title, body);
  if(!systemNotifEnabled()) return;
  const opts = {body, icon:'./icon.svg', badge:'./icon.svg', tag: tag||undefined};
  if('serviceWorker' in navigator && navigator.serviceWorker.getRegistration){
    navigator.serviceWorker.getRegistration('./sw.js').then(reg=>{
      if(reg) reg.showNotification(title, opts);
      else new Notification(title, opts);
    }).catch(()=>{ try{ new Notification(title, opts); }catch(e){} });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}

function checkFinanceReminders(){
  if(!state || !notifEnabled()) return;
  const today = todayISO();
  const lastReminder = localStorage.getItem(NOTIF_LAST_REMINDER_KEY);
  const hour = new Date().getHours();
  const loggedToday = state.transactions.some(t=>t.date===today);
  if(lastReminder!==today && hour>=18 && !loggedToday){
    showLedgerNotification("Log today's transactions", "You haven't recorded any income or expenses today — keep your Ledger up to date.", 'ledger-daily-log');
    localStorage.setItem(NOTIF_LAST_REMINDER_KEY, today);
  }
  let notified = {};
  try{ notified = JSON.parse(localStorage.getItem(NOTIF_BUDGET_ALERTS_KEY)||'{}'); }catch(e){ notified = {}; }
  state.budgets.forEach(b=>{
    if(!b.amount) return;
    const key = currentPeriodKey(b.period);
    const spent = state.transactions
      .filter(t=>t.type==='expense' && t.categoryId===b.categoryId && txInPeriod(t,b.period,key))
      .reduce((s,t)=>s+t.amount,0);
    const pct = spent / b.amount;
    const cat = catById(b.categoryId);
    const catName = cat ? cat.name : 'Budget';
    const overKey = `${b.id}:${key}:over`;
    const warnKey = `${b.id}:${key}:warn`;
    if(pct>=1 && !notified[overKey]){
      showLedgerNotification(`${catName} budget exceeded`, `You've spent ${fmt(spent)} of your ${fmt(b.amount)} ${catName} budget this ${b.period.replace('ly','')}.`, overKey);
      notified[overKey] = true;
    } else if(pct>=0.9 && pct<1 && !notified[warnKey]){
      showLedgerNotification(`${catName} budget almost reached`, `You've used ${Math.round(pct*100)}% of your ${fmt(b.amount)} ${catName} budget this ${b.period.replace('ly','')}.`, warnKey);
      notified[warnKey] = true;
    }
  });
  try{ localStorage.setItem(NOTIF_BUDGET_ALERTS_KEY, JSON.stringify(notified)); }catch(e){}
}

async function loadState(){
  try{
    const saved = localStorage.getItem('ledger-data-v1');
    state = saved ? JSON.parse(saved) : seedData();
  }catch(e){

  }
  migrateCategoryIcons();

}
function migrateCategoryIcons(){
  const EMOJI_TO_ICON = {
    '💰':'wallet','🍽️':'utensils','🚗':'car','🏠':'home','💡':'bulb','🎬':'screen',
    '🛍️':'bag','💊':'pill','📚':'book','✈️':'plane','🎁':'bag','📈':'up','🧾':'receipt',
    '☕':'coffee','📱':'phone','🐄':'leaf','💼':'briefcase','⛪':'landmark','⛽':'fuel',
    '🚿':'droplet','💻':'laptop'
  };
  if(!state?.categories) return;
  let changed = false;
  state.categories.forEach(c=>{
    if(c.icon && !ICONS[c.icon]){
      c.icon = EMOJI_TO_ICON[c.icon] || guessCategoryIcon(c.name, c.type);
      changed = true;
    }
  });
  if(changed){ try{ localStorage.setItem('ledger-data-v1', JSON.stringify(state)); }catch(e){} }
}
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem('ledger-data-v1', JSON.stringify(state));
    }catch(e){}
  },350);
}

/* ============ PERIOD HELPERS ============ */
function isoWeekKey(dateStr){
  const dt = new Date(dateStr+'T00:00:00');
  const target = new Date(dt.valueOf());
  const dayNr = (dt.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday = new Date(target.getFullYear(),0,4);
  const diff = target - firstThursday;
  const week = 1+Math.round(diff/(7*24*3600*1000));
  return target.getFullYear()+'-W'+String(week).padStart(2,'0');
}
function periodKey(dateStr,period){
  if(period==='weekly') return isoWeekKey(dateStr);
  if(period==='yearly') return dateStr.slice(0,4);
  return dateStr.slice(0,7);
}
function currentPeriodKey(period){ return periodKey(todayISO(),period); }
function periodLabel(key,period){
  if(period==='monthly'){
    const [y,m]=key.split('-'); return new Date(y,m-1,1).toLocaleString('en',{month:'short',year:'numeric'});
  }
  if(period==='yearly') return key;
  return key;
}
function shiftPeriodKey(period, back){
  const today = new Date();
  if(period==='monthly'){ today.setMonth(today.getMonth()-back); return today.toISOString().slice(0,7); }
  if(period==='yearly'){ today.setFullYear(today.getFullYear()-back); return String(today.getFullYear()); }
  today.setDate(today.getDate()-back*7); return isoWeekKey(today.toISOString().slice(0,10));
}
function txInPeriod(t, period, key){ return periodKey(t.date,period)===key; }

/* ============ COMPUTATION HELPERS ============ */
function catById(id){ return state.categories.find(c=>c.id===id); }
function bizById(id){ return state.businesses.find(b=>b.id===id); }
function sourceById(id){ return state.incomeSources.find(s=>s.id===id); }
function sourceLabel(source){
  if(!source) return null;
  if(source.kind==='business') return bizById(source.id)?.name;
  return sourceById(source.id)?.name;
}
function totals(txs){
  let income=0, expense=0;
  txs.forEach(t=>{ if(t.type==='income') income+=t.amount; else expense+=t.amount; });
  return {income, expense, net:income-expense};
}
function currentPeriodTx(period){
  const key = currentPeriodKey(period);
  return state.transactions.filter(t=>txInPeriod(t,period,key));
}
function categoryBreakdown(txs,type){
  const map = {};
  txs.filter(t=>t.type===type).forEach(t=>{ map[t.categoryId]=(map[t.categoryId]||0)+t.amount; });
  return Object.entries(map).map(([id,amount])=>({cat:catById(id),amount})).filter(x=>x.cat).sort((a,b)=>b.amount-a.amount);
}

function overspendWarnings(){

function donutChart(breakdown,total){
  const size=140, r=52, cx=70, cy=70, circ=2*Math.PI*r;
  let offset=0;
  const segs = breakdown.map(b=>{
    const frac = b.amount/total;
    const dash = frac*circ;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${b.cat.color}" stroke-width="16" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return seg;
  }).join('');
  return `<div class="donut-wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 140 140">
      ${segs}
      <text x="70" y="66" text-anchor="middle" font-size="11" fill="var(--ink-faint)" font-family="Inter">Total</text>
      <text x="70" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="var(--ink)" font-family="IBM Plex Mono">${fmt(total).replace('KES','').trim()}</text>
    </svg>
    <div class="legend">
      ${breakdown.slice(0,6).map(b=>`
        <div class="legend-item">
          <div class="legend-dot" style="background:${b.cat.color}"></div>
          <div class="legend-name">${catIconInline(b.cat)}${b.cat.name}</div>
          <div class="legend-val mono">${Math.round(b.amount/total*100)}%</div>
        </div>`).join('')}
    </div>
  </div>`;
}

}

function submitTx(e, type, editId){
  e.preventDefault();
  const f = e.target;
  const amount = parseFloat(f.amount.value);
  const categoryId = f.categoryId.value;
  const date = f.date.value;
  const note = f.note.value;
  let source = null;
  if(f.source && f.source.value){
    const [kind,id] = f.source.value.split(':');
    source = {kind,id};
  }
  mutate(s=>{
    if(editId){
      const t = s.transactions.find(t=>t.id===editId);
      Object.assign(t,{type,amount,categoryId,date,note,source});
    } else {
      s.transactions.push({id:uid(),type,amount,categoryId,date,note,source});
      if(type==='income') applyAutomation(s, amount, source, date);
    }
  });
  closeSheet();
  return false;
}
function applyAutomation(s, incomeAmount, source, date){
  s.automationRules.filter(r=>r.enabled).forEach(r=>{
    if(r.appliesTo!=='all' && !(source && (source.id===r.appliesTo))) return;
    const cat = s.categories.find(c=>c.id===r.categoryId);
    if(!cat) return;
    const allocAmount = Math.round(incomeAmount*(r.percent/100));
    if(allocAmount<=0) return;
    s.transactions.push({id:uid(),type:'expense',amount:allocAmount,categoryId:r.categoryId,date,note:`Auto: ${r.name}`,source:null});
  });
}

      </div>

function loadMpesaFile(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const textarea = document.querySelector('#sheet textarea[name="message"]');
    if(textarea) textarea.value = reader.result || '';
  };
  reader.readAsText(file);
}

function parseMpesaImport(e){
  e.preventDefault();
  const raw = e.target.message.value.trim();
  const parsed = parseMpesaMessage(raw);
  if(!parsed.valid){
    showMpesaParseError(parsed.error || 'I could not read that message. Please check that it includes an amount and date.');
    return false;
  }
  pendingMpesaImport = parsed;
  renderMpesaCategoryStep(parsed);
  return false;
}

function showMpesaParseError(message){
  const existing = document.getElementById('mpesa-parse-error');
  if(existing) existing.remove();
  const form = document.querySelector('#sheet form');
  if(!form) return;
  form.insertAdjacentHTML('afterbegin', `<div id="mpesa-parse-error" class="banner danger">${icon('alert',17)}<div class="banner-text">${escapeHTML(message)}</div></div>`);
}

function parseMpesaMessage(message){
  const clean = message.replace(/\s+/g,' ').trim();
  const lower = clean.toLowerCase();
  const amountMatch = clean.match(/(?:ksh|kes)\s*([0-9][0-9,]*(?:\.\d{1,2})?)/i);
  const dateMatch = clean.match(/\bon\s+(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})(?:\s+at\s+([0-9:.]+\s*(?:am|pm)?))?/i);
  const amount = amountMatch ? parseFloat(amountMatch[1].replace(/,/g,'')) : 0;
  const date = dateMatch ? mpesaDateToISO(dateMatch) : '';
  const type = detectMpesaType(lower);
  const party = detectMpesaParty(clean, type);
  if(!amount) return {valid:false,error:'No M-Pesa amount was found in that message.'};
  if(!date) return {valid:false,error:'No transaction date was found. Please paste the full M-Pesa message with the "on day/month/year" date.'};
  if(!type) return {valid:false,error:'I found the amount, but could not tell if it is income or expense.'};
  return {
    valid:true,
    type,
    amount,
    date,
    party,
    raw:clean,
    note: mpesaNote(type, party, clean)
  };
}

function detectMpesaType(lower){
  if(/\bpaid to\b|\bsent to\b|\bwithdrawn?\b|\bbought\b|\bairtime\b|\bpay bill\b|\bbuy goods\b/.test(lower)) return 'expense';
  if(/\breceived\b|\byou have received\b/.test(lower)) return 'income';
  return null;
}

function detectMpesaParty(message, type){
  if(type==='expense' && /\bairtime\b/i.test(message)) return 'Safaricom Airtime';
  const patterns = type==='income'
    ? [/\bfrom\s+(.+?)(?:\s+\d{7,}|\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i]
    : [
        /\bpaid to\s+(.+?)(?:\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
        /\bsent to\s+(.+?)(?:\s+\d{7,}|\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
        /\bwithdrawn from\s+(.+?)(?:\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
      ];
  for(const pattern of patterns){
    const match = message.match(pattern);
    if(match && match[1]) return cleanMpesaParty(match[1]);
  }
  return type==='income' ? 'M-Pesa sender' : 'M-Pesa recipient';
}

function cleanMpesaParty(value){
  return value
    .replace(/\baccount\s+no\.?.*$/i,'')
    .replace(/\btill\s+no\.?.*$/i,'')
    .replace(/\bbusiness\s+no\.?.*$/i,'')
    .replace(/\bfor\s*$/i,'')
    .replace(/\s+/g,' ')
    .replace(/[.,;:]+$/,'')
    .trim();
}

function mpesaDateToISO(match){
  const day = parseInt(match[1],10);
  const month = parseInt(match[2],10);
  let year = parseInt(match[3],10);
  if(year<100) year += 2000;
  if(!day || !month || month>12) return todayISO();
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function mpesaNote(type, party, raw){
  const prefix = type==='income' ? 'M-Pesa from' : 'M-Pesa to';
  return `${prefix} ${party || 'unknown'}`.slice(0,80);
}

  document.getElementById('sheet').innerHTML = `

function submitMpesaImport(e){
  e.preventDefault();
  if(!pendingMpesaImport) return false;
  const f = e.target;
  const parsed = pendingMpesaImport;
  mutate(s=>{
    s.transactions.push({
      id:uid(),
      type:parsed.type,
      amount:parsed.amount,
      categoryId:f.categoryId.value,
      date:f.date.value,
      note:f.note.value.trim() || parsed.note,
      source:null,
      mpesa:{party:parsed.party, message:parsed.raw}
    });
    if(parsed.type==='income') applyAutomation(s, parsed.amount, null, f.date.value);
  });
  pendingMpesaImport=null;
  closeSheet();
  return false;
}

function mpesaShareText(txId){
  const tx = state.transactions.find(t=>t.id===txId);
  return tx?.mpesa?.message || null;
}
async function shareViaSystem(txId){
  const tx = state.transactions.find(t=>t.id===txId);
  const text = mpesaShareText(txId);
  if(!text) return;
  try{
    await systemShare({ title:`M-Pesa ${tx.type==='income'?'income':'expense'} - ${fmt(tx.amount)}`, text });
    showMpesaShareStatus('Shared successfully.', 'info');
  }catch(e){
    if(e && e.name==='AbortError') return;
    showMpesaShareStatus('Could not open the share sheet.', 'danger');
  }

function shareToWhatsapp(txId){
  const text = mpesaShareText(txId);
  if(!text) return;
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  if(isMedianApp) window.location.href = url; else window.open(url, '_blank');
}
function shareToTelegram(txId){
  const text = mpesaShareText(txId);
  if(!text) return;
  const url = `https://t.me/share/url?url=&text=${encodeURIComponent(text)}`;
  if(isMedianApp) window.location.href = url; else window.open(url, '_blank');
}
function shareToSms(txId){
  const text = mpesaShareText(txId);
  if(!text) return;
  window.location.href = `sms:?body=${encodeURIComponent(text)}`;
}
function shareToEmail(txId){
  const tx = state.transactions.find(t=>t.id===txId);
  const text = mpesaShareText(txId);
  if(!text) return;
  const subject = encodeURIComponent(`M-Pesa ${tx.type==='income'?'income':'expense'} - ${fmt(tx.amount)}`);
  window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(text)}`;

/* ============ INSIGHTS ============ */
function generateInsights(){
  const insights = [];
  const period='monthly';
  const thisKey = currentPeriodKey(period);
  const lastKey = shiftPeriodKey(period,1);

  // Overall income/expense trend
  const thisTx = state.transactions.filter(t=>txInPeriod(t,period,thisKey));
  const lastTx = state.transactions.filter(t=>txInPeriod(t,period,lastKey));
  const thisT = totals(thisTx), lastT = totals(lastTx);
  if(lastT.income>0){
    const diff = thisT.income-lastT.income;
    const pct = Math.round(Math.abs(diff)/lastT.income*100);
    if(Math.abs(pct)>=5){
      insights.push({icon:diff>=0?'up':'down',color:diff>=0?'#0D9488':'#C0362C',
        title:`Income ${diff>=0?'up':'down'} ${pct}% vs last month`,
        body:`You earned ${fmt(thisT.income)} this month compared to ${fmt(lastT.income)} last month, a ${diff>=0?'gain':'drop'} of ${fmt(Math.abs(diff))}.`});
    }
  }
  if(lastT.expense>0){
    const diff = thisT.expense-lastT.expense;
    const pct = Math.round(Math.abs(diff)/lastT.expense*100);
    if(Math.abs(pct)>=5){
      insights.push({icon:diff>=0?'up':'down',color:diff>=0?'#C0362C':'#0D9488',
        title:`Spending ${diff>=0?'up':'down'} ${pct}% vs last month`,
        body:`You spent ${fmt(thisT.expense)} this month vs ${fmt(lastT.expense)} last month.`});
    }
  }

  // Category driving the expense change
  const thisBreak = categoryBreakdown(thisTx,'expense');
  const lastBreak = categoryBreakdown(lastTx,'expense');
  let biggestDelta=null;
  thisBreak.forEach(cur=>{
    const prev = lastBreak.find(p=>p.cat.id===cur.cat.id);
    const delta = cur.amount-(prev?prev.amount:0);
    if(!biggestDelta || Math.abs(delta)>Math.abs(biggestDelta.delta)) biggestDelta={cat:cur.cat,delta};
  });
  if(biggestDelta && Math.abs(biggestDelta.delta)>0){
    insights.push({icon:biggestDelta.delta>0?'up':'down',color:biggestDelta.delta>0?'#C2760C':'#0D9488',
      title:`${biggestDelta.cat.name} moved the most`,
      body:`${biggestDelta.cat.name} ${biggestDelta.delta>0?'increased':'decreased'} by ${fmt(Math.abs(biggestDelta.delta))} compared to last month — the biggest single shift in your spending.`});
  }

  // Business comparison
  if(state.businesses.length>=1){
    const bizPerf = state.businesses.map(b=>{
      const cur = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,thisKey));
      const prev = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,lastKey));
      return {biz:b, cur:totals(cur), prev:totals(prev)};
    });
    if(bizPerf.length>=2){
      const best = [...bizPerf].sort((a,b)=>b.cur.net-a.cur.net)[0];
      const worst = [...bizPerf].sort((a,b)=>a.cur.net-b.cur.net)[0];
      if(best.biz.id!==worst.biz.id){
        insights.push({icon:'briefcase',color:'#3B6FA0',
          title:`${best.biz.name} is outperforming ${worst.biz.name}`,
          body:`${best.biz.name} netted ${fmt(best.cur.net)} this month vs ${fmt(worst.cur.net)} for ${worst.biz.name}. Consider reviewing ${worst.biz.name}'s expenses or income sources.`});
      }
    }
    bizPerf.forEach(bp=>{
      if(bp.prev.income>0 && bp.cur.income<bp.prev.income){
        const dropPct = Math.round((bp.prev.income-bp.cur.income)/bp.prev.income*100);
        if(dropPct>=10){
          const expDelta = bp.cur.expense-bp.prev.expense;
          insights.push({icon:'down',color:'#C0362C',
            title:`${bp.biz.name} earned less this month`,
            body:`Income fell ${dropPct}% (${fmt(bp.prev.income)} → ${fmt(bp.cur.income)})${expDelta>0?`, while expenses rose by ${fmt(expDelta)} — worth checking what changed.`:'. Worth a closer look at what changed this month.'}`});
        }
      }
    });
  }

  // Budget-based insight
  const warnings = overspendWarningsFor('monthly');
  warnings.forEach(w=>{
    insights.push({icon:'alert',color: w.over?'#C0362C':'#C2760C',
      title:`${w.cat.name} budget ${w.over?'exceeded':'nearly reached'}`,
      body:`You've spent ${fmt(w.spent)} of your ${fmt(w.budget)} ${w.cat.name} budget this month (${Math.round(w.pct*100)}%).`});
  });

  if(insights.length===0){
    insights.push({icon:'info',color:'#0D9488',title:'Not enough data yet',body:'Keep logging income and expenses — insights get sharper the more transactions you add.'});
  }
  return insights;
}
function overspendWarningsFor(period){
  const key = currentPeriodKey(period);
  const txs = state.transactions.filter(t=>txInPeriod(t,period,key)&&t.type==='expense');
  const warnings=[];
  state.budgets.filter(b=>b.period===period).forEach(b=>{
    const spent = txs.filter(t=>t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct = spent/b.amount;
    const cat = catById(b.categoryId);
    if(cat && pct>=0.9) warnings.push({cat,spent,budget:b.amount,pct,over:pct>=1});
  });
  return warnings;
}

function buildFinancialSnapshot(){
  const allT = totals(state.transactions);
  const period = 'monthly';
  const key = currentPeriodKey(period);
  const monthTx = state.transactions.filter(t=>txInPeriod(t,period,key));
  const monthT = totals(monthTx);
  const budgetLines = state.budgets.length ? state.budgets.map(b=>{
    const cat = catById(b.categoryId);
    const spent = monthTx.filter(t=>t.type==='expense'&&t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct = b.amount>0 ? Math.round(spent/b.amount*100) : 0;
    return `${cat?cat.name:'Unknown'} (${b.period}): spent ${fmt(spent)} of ${fmt(b.amount)} budget (${pct}%)`;
  }).join('; ') : 'No budgets set';
  const targetLines = state.targets.length ? state.targets.map(tg=>`${tg.period} target ${fmt(tg.amount)} (currently at ${fmt(monthT.net)} net this month)`).join('; ') : 'No savings targets set';
  const bizLines = state.businesses.length ? state.businesses.map(b=>{
    const tx = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,key));
    const t = totals(tx);
    return `${b.name}: income ${fmt(t.income)}, expense ${fmt(t.expense)}, net ${fmt(t.net)} this month`;
  }).join('; ') : 'No businesses tracked';
  const recentTx = [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20)
    .map(t=>`${t.date} ${t.type} ${fmt(t.amount)} — ${catById(t.categoryId)?.name||'Uncategorized'}${sourceLabel(t.source)?' via '+sourceLabel(t.source):''}${t.note?' ('+t.note+')':''}`)
    .join('\n');
  return [
    `All-time net balance: ${fmt(allT.net)} (total income ${fmt(allT.income)}, total expense ${fmt(allT.expense)}).`,
    `This month so far: income ${fmt(monthT.income)}, expenses ${fmt(monthT.expense)}, net ${fmt(monthT.net)}.`,
    `Budgets: ${budgetLines}.`,
    `Targets: ${targetLines}.`,
    `Businesses: ${bizLines}.`,
    `Recent transactions, most recent first:\n${recentTx || 'none yet'}`
  ].join('\n\n');
}

async function callGeminiAdvisor(userMessage){
  const apiKey = localStorage.getItem(AI_KEY_STORAGE);
  if(!apiKey) throw new Error('No API key saved yet. Tap "Add key" above.');
  const snapshot = buildFinancialSnapshot();
  // Gemini uses 'user' and 'model' roles (not 'assistant'), and wraps text in a parts array.
  const history = aiChat.slice(-10).map(m=>({
    role: m.role==='assistant' ? 'model' : 'user',
    parts: [{text: m.content}]
  }));
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      systemInstruction: {
        parts: [{text: `You are the financial advisor built into the user's personal "Ledger" app. All amounts are in Kenyan Shillings (KES). Base every answer strictly on the financial snapshot below — never invent numbers that aren't in it. Be direct and specific (cite real figures and category names), flag overspending against stated budgets/targets when it applies, and keep answers concise (roughly under 150 words) unless the user asks for more detail. Write in plain conversational text only — no markdown, no asterisks, no bullet symbols, no bold/italic formatting; use plain sentences or a simple numbered list with "1." "2." etc. if you need a list.\n\nFINANCIAL SNAPSHOT:\n${snapshot}`}]
      },
      contents: [...history, {role:'user', parts:[{text:userMessage}]}],
      generationConfig: { maxOutputTokens: 700 }
    })
  });
  if(!res.ok){
    let detail = '';
    try{ detail = (await res.json()).error?.message || ''; }catch(e){}
    if(res.status===400 && /api key/i.test(detail)) throw new Error('That API key was rejected. Double-check it in "Add key".');
    if(res.status===403) throw new Error('That API key was rejected or lacks access. Double-check it in "Add key".');
    throw new Error(detail || `Request failed (${res.status}).`);
  }
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts.map(p=>p.text||'').join('\n').trim();
  return sanitizeAdvisorText(text) || "I didn't get a usable response — try again.";
}
function sanitizeAdvisorText(text){
  return (text||'')
    .replace(/\*\*(.*?)\*\*/g, '$1')  // bold
    .replace(/\*(.*?)\*/g, '$1')      // italic
    .replace(/^[ \t]*\*[ \t]+/gm, '') // leftover bullet asterisks
    .replace(/\*/g, '')               // any remaining stray asterisks
    .trim();
}

function toggleMic(){
  if(!micSupported()){
    alert('Voice input isn\'t supported in this browser. It works best in Chrome on Android.');
    return;
  }
  if(isListening){ recognizer && recognizer.stop(); return; }
  recognizer = new SpeechRecognitionAPI();
  recognizer.lang = 'en-US';
  recognizer.interimResults = true;
  recognizer.continuous = false;
  recognizer.onstart = ()=>{ isListening = true; render(); };
  recognizer.onerror = ()=>{ isListening = false; render(); };
  recognizer.onend = ()=>{ isListening = false; };
  recognizer.onresult = (e)=>{
    let transcript = '';
    for(let i=0;i<e.results.length;i++) transcript += e.results[i][0].transcript;
    const input = document.getElementById('aiInput');
    if(input) input.value = transcript;
    if(e.results[e.results.length-1].isFinal){
      sendAdvisorMessage({preventDefault(){}});
    }
  };
  try{ recognizer.start(); }catch(e){ isListening=false; }
}

function getExportTx(){
  const range = document.getElementById('exportRange').value;
  const bizId = document.getElementById('exportBiz').value;
  const now = new Date();
  let txs = [...state.transactions];
  if(range==='year'){

  } else if(range==='month'){
    const y = now.getFullYear(), m = now.getMonth();
    txs = txs.filter(t=>{ const d=new Date(t.date); return d.getFullYear()===y && d.getMonth()===m; });
  }
  if(bizId!=='all'){

  }
  return txs.sort((a,b)=>a.date.localeCompare(b.date));

function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
// Delivers a generated file to the user. Returns {ok, method} — method is
// 'median', 'browser', or 'failed' so callers can tailor their messaging
// (e.g. offer a clipboard-copy fallback when a binary file can't be delivered).
async function deliverFile(filename, blob){
  if(isMedianApp){
    const bridge = medianBridge();
    if(bridge?.share?.downloadFile){
      try{
        const dataUrl = await blobToDataURL(blob);
        await bridge.share.downloadFile({url: dataUrl, open: true});
        return {ok:true, method:'median'};
      }catch(e){
        return {ok:false, method:'failed'};
      }
    }
    return {ok:false, method:'failed'};
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  return {ok:true, method:'browser'};
}
function triggerDownload(filename, content, mime){
  return deliverFile(filename, new Blob([content], {type:mime}));
}
function csvEscape(v){
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
async function runExport(kind){
  const txs = getExportTx();
  if(!txs.length){
    alert('No transactions match that range/business.');
    return;
  }
  const btns = document.querySelectorAll('.form-actions .btn');
  btns.forEach(b=>b.disabled = true);
  try{
    if(kind==='csv') await exportLedgerCSV(txs);
    else await exportLedgerPDF(txs);
  } finally {
    btns.forEach(b=>b.disabled = false);
  }
}
async function exportLedgerCSV(txs){
  const rows = [['Date','Type','Category','Business/Source','Note','Amount (KES)']];
  let balance = 0;
  txs.forEach(t=>{
    balance += t.type==='income' ? t.amount : -t.amount;
    rows.push([t.date, t.type, catById(t.categoryId)?.name||'', sourceLabel(t.source)||'', t.note||'', t.type==='income'?t.amount:-t.amount]);
  });
  const totalIncome = txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  rows.push([]);
  rows.push(['','','','','Total income', totalIncome]);
  rows.push(['','','','','Total expense', -totalExpense]);
  rows.push(['','','','','Net', totalIncome-totalExpense]);
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  const result = await triggerDownload(`ledger-${todayISO()}.csv`, csv, 'text/csv;charset=utf-8;');
  if(result.ok){
    closeSheet();
  } else {
    // Native file delivery didn't work in this app build — copying the CSV
    // text is a guaranteed fallback that always works.
    try{
      await copyText(csv);
      alert("Couldn't save the file directly, so the CSV was copied to your clipboard instead — paste it into Notes, Sheets, or Excel to keep it.");
    }catch(e){
      alert("Couldn't save or copy the file on this device. Try opening Ledger in your phone's browser instead.");
    }
    closeSheet();
  }
}
async function exportLedgerPDF(txs){
  if(!window.jspdf || !window.jspdf.jsPDF){
    alert('PDF engine is still loading — please wait a moment and try again.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const totalIncome = txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const net = totalIncome - totalExpense;

  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text('Client Nest — Ledger Statement', 40, 46);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(90,100,110);
  doc.text(`${txs.length} transactions · ${txs[0].date} to ${txs[txs.length-1].date}`, 40, 62);
  doc.text(`Generated ${todayISO()}  ·  All amounts in KES`, 40, 74);

  doc.setDrawColor(220,224,222);
  doc.line(40, 84, 555, 84);

  doc.setFontSize(9);
  doc.setTextColor(90,100,110);
  doc.text('TOTAL INCOME', 40, 100);
  doc.text('TOTAL EXPENSE', 220, 100);
  doc.text('NET', 400, 100);
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(10,122,112);
  doc.text(fmt(totalIncome), 40, 116);
  doc.setTextColor(192,54,44);
  doc.text(fmt(totalExpense), 220, 116);
  doc.setTextColor(15,23,42);
  doc.text(fmt(net), 400, 116);

  let balance = 0;
  const body = txs.map(t=>{
    balance += t.type==='income' ? t.amount : -t.amount;
    const cat = catById(t.categoryId);
    const src = sourceLabel(t.source);
    return [
      t.date,
      cat?cat.name:'',
      t.note||'',
      src||'',
      (t.type==='income'?'+':'-')+fmt(t.amount),
      fmt(balance)
    ];
  });

  doc.autoTable({
    startY: 134,
    head: [['Date','Category','Note','Business/Source','Amount','Balance']],
    body,
    styles:{ fontSize:8.5, cellPadding:5, textColor:[15,23,42] },
    headStyles:{ fillColor:[15,23,42], textColor:255, fontStyle:'bold' },
    columnStyles:{ 4:{halign:'right'}, 5:{halign:'right'} },
    didParseCell: (d)=>{
      if(d.section==='body' && d.column.index===4){
        d.cell.styles.textColor = body[d.row.index][4].startsWith('+') ? [10,122,112] : [192,54,44];
      }
    },
    margin:{ left:40, right:40 },
    theme:'striped'
  });

  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(150,160,172);
    doc.text('Generated by Ledger', 40, 820);
    doc.text(`Page ${i} of ${pageCount}`, 515, 820);
  }

  const filename = `ledger-${todayISO()}.pdf`;
  const result = await deliverFile(filename, doc.output('blob'));
  if(result.ok){
    closeSheet();
  } else {
    alert("Couldn't save the PDF on this device. Try the CSV export instead, or open Ledger in your phone's browser to save the PDF statement.");
    closeSheet();
  }
}

/* ============ SHEET / MODAL CONTROLS ============ */
// Sheets/modals never change the URL, so on Android the hardware back button
// would otherwise close the whole app immediately while one is open — there's
// no other history entry to go back to first. Push a lightweight history
// entry whenever a sheet opens so back closes the sheet instead, and only
// falls through to exiting the app on a second press. This works the same
// way whether the page is a plain browser tab, an installed PWA, or wrapped
// by Median (which relies on the WebView's own back-navigation behavior).
let sheetHistoryPushed = false;
function showSheet(){
  document.getElementById('overlay').classList.add('show');
  if(!sheetHistoryPushed){
    history.pushState({ledgerSheet:true}, '');
    sheetHistoryPushed = true;
  }
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('show');
  if(sheetHistoryPushed){
    sheetHistoryPushed = false;
    if(history.state && history.state.ledgerSheet) history.back();
  }
}
window.addEventListener('popstate', ()=>{
  sheetHistoryPushed = false;
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeSheet(); });

loadTheme();
loadAIChat();
loadState();
if(localStorage.getItem(NOTIF_ENABLED_KEY)==='true' && notifPermission()==='granted' && 'serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
setInterval(checkFinanceReminders, 60*60*1000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkFinanceReminders(); });
</script>
