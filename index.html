<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ledger — Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --bg:#F7F7F4;
  --surface:#FFFFFF;
  --surface-alt:#F0F4F2;
  --ink:#0F172A;
  --ink-soft:#5B6472;
  --ink-faint:#94A0AC;
  --teal:#0D9488;
  --teal-dark:#0A7A70;
  --teal-tint:#E3F5F2;
  --amber:#C2760C;
  --amber-tint:#FBF0DD;
  --red:#C0362C;
  --red-tint:#FBEAE8;
  --border:#E4E7E5;
  --nav-bg:rgba(255,255,255,.92);
  --brand-mark-bg:#0F172A;
  --brand-mark-fg:#FFFFFF;
  --primary-btn-bg:#0F172A;
  --primary-btn-fg:#FFFFFF;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.10);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#101412;
  --surface:#171C1A;
  --surface-alt:#222A27;
  --ink:#F3F7F5;
  --ink-soft:#B6C0BB;
  --ink-faint:#7F8B86;
  --teal:#2DD4BF;
  --teal-dark:#5EEAD4;
  --teal-tint:#123A36;
  --amber:#F0B45A;
  --amber-tint:#3D2B14;
  --red:#F87171;
  --red-tint:#3D1D1D;
  --border:#2A3430;
  --nav-bg:rgba(23,28,26,.92);
  --brand-mark-bg:#F3F7F5;
  --brand-mark-fg:#101412;
  --primary-btn-bg:#2DD4BF;
  --primary-btn-fg:#06201D;
  --shadow:0 1px 2px rgba(0,0,0,.28), 0 10px 28px -14px rgba(0,0,0,.70);
}
#print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{display:block;position:absolute;top:0;left:0;width:100%;padding:24px;background:#fff;color:#0F172A;}
  .p-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0F172A;padding-bottom:12px;margin-bottom:16px;}
  .p-title{font-family:'Space Grotesk',system-ui,sans-serif;font-size:22px;font-weight:700;margin:0;}
  .p-sub{font-size:12px;color:#5B6472;margin-top:4px;}
  .p-meta{text-align:right;font-size:12px;color:#5B6472;}
  .p-summary{display:flex;gap:18px;margin-bottom:16px;}
  .p-summary div{border:1px solid #E4E7E5;border-radius:8px;padding:10px 14px;flex:1;}
  .p-summary .p-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#5B6472;}
  .p-summary .p-value{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;margin-top:2px;}
  table.p-table{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.p-table th{text-align:left;border-bottom:1.5px solid #0F172A;padding:6px 6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:#5B6472;}
  table.p-table td{padding:6px 6px;border-bottom:1px solid #E4E7E5;}
  table.p-table td.amt{font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;}
  table.p-table td.amt.income{color:#0A7A70;}
  table.p-table td.amt.expense{color:#C0362C;}
  .p-footer{margin-top:14px;font-size:10.5px;color:#94A0AC;text-align:center;}
  @page{margin:14mm;}
}
*{box-sizing:border-box;}
.chat-bubble{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;}
.chat-bubble.user{align-self:flex-end;background:var(--primary-btn-bg);color:var(--primary-btn-fg);border-bottom-right-radius:4px;}
.chat-bubble.ai{align-self:flex-start;background:var(--surface-alt);color:var(--ink);border-bottom-left-radius:4px;}
.ai-typing{opacity:.65;font-style:italic;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}
h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* ---------- Layout shells ---------- */
#app{min-height:100dvh;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;background:var(--brand-mark-bg);
  display:flex;align-items:center;justify-content:center;color:var(--brand-mark-fg);font-weight:700;font-family:'Space Grotesk';
  flex-shrink:0;
}
.brand-name{font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:-.01em;}
.icon-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex-shrink:0;
  transition:background .15s;
}
.icon-btn:active{background:var(--surface-alt);}

.page-wrap{padding:0 16px 100px;max-width:1200px;margin:0 auto;}
.section-title{font-size:13px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin:22px 2px 10px;}
.section-title.first{margin-top:6px;}

/* Bottom nav (mobile app feel) */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;
  background:var(--nav-bg);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index:40;
}
.nav-btn{
  background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--ink-faint);font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:10px;
}
.nav-btn.active{color:var(--teal);}
.nav-btn svg{width:21px;height:21px;}

/* Desktop sidebar */
.desktop-shell{display:none;}
@media (min-width:900px){
  .mobile-shell{display:none;}
  .desktop-shell{display:flex;min-height:100dvh;}
  .sidebar{
    width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 14px;gap:2px;position:sticky;top:0;height:100dvh;
  }
  .sidebar .brand{padding:6px 8px 22px;}
  .side-link{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;color:var(--ink-soft);
    font-weight:600;font-size:14px;border:none;background:none;text-align:left;width:100%;
  }
  .side-link svg{width:19px;height:19px;flex-shrink:0;}
  .side-link.active{background:var(--teal-tint);color:var(--teal-dark);}
  .side-link:hover:not(.active){background:var(--surface-alt);}
  .desktop-main{flex:1;min-width:0;padding:28px 36px 60px;max-width:1180px;}
  .desktop-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .page-wrap{display:none;}
  .bottomnav{display:none;}
  .topbar{display:none;}
  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
  .grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
}
@media (max-width:899px){
  .desktop-shell{display:none;}
}

/* ---------- Cards / components ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;box-shadow:var(--shadow);
}
.grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:14px 14px;
}
.stat-label{font-size:12px;color:var(--ink-faint);font-weight:600;margin-bottom:6px;}
.stat-value{font-size:19px;font-weight:600;letter-spacing:-.01em;}
.stat-value.pos{color:var(--teal-dark);}
.stat-value.neg{color:var(--red);}
.pill{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;
}
.pill.teal{background:var(--teal-tint);color:var(--teal-dark);}
.pill.amber{background:var(--amber-tint);color:var(--amber);}
.pill.red{background:var(--red-tint);color:var(--red);}
.pill.gray{background:var(--surface-alt);color:var(--ink-soft);}

.period-switch{
  display:flex;background:var(--surface-alt);border-radius:11px;padding:3px;gap:2px;
}
.period-switch button{
  border:none;background:none;padding:7px 13px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--ink-soft);
}
.period-switch button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}

.list-row{
  display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--border);
}
.list-row:last-child{border-bottom:none;}
.row-icon{
  width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.row-main{flex:1;min-width:0;}
.row-title{font-weight:600;font-size:14.5px;}
.row-sub{font-size:12px;color:var(--ink-faint);margin-top:1px;}
.row-amt{font-weight:600;font-size:14.5px;text-align:right;white-space:nowrap;}
.row-amt.income{color:var(--teal-dark);}
.row-amt.expense{color:var(--ink);}

.fab{
  position:fixed;right:18px;bottom:84px;width:56px;height:56px;border-radius:18px;
  background:var(--primary-btn-bg);color:var(--primary-btn-fg);border:none;display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 24px -8px rgba(15,23,42,.45);z-index:41;
}
@media (min-width:900px){.fab{display:none;}}
.btn{
  border:none;border-radius:12px;padding:11px 16px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;
}
.btn-primary{background:var(--primary-btn-bg);color:var(--primary-btn-fg);}
.btn-secondary{background:var(--surface-alt);color:var(--ink);}
.btn-danger{background:var(--red-tint);color:var(--red);}
.btn-block{width:100%;justify-content:center;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px;}

.empty{
  text-align:center;padding:40px 20px;color:var(--ink-faint);
}
.empty svg{width:38px;height:38px;margin-bottom:10px;opacity:.5;}
.empty-title{font-weight:600;color:var(--ink-soft);margin-bottom:4px;font-size:14.5px;}

.progress-track{height:8px;border-radius:99px;background:var(--surface-alt);overflow:hidden;margin-top:9px;}
.progress-fill{height:100%;border-radius:99px;transition:width .3s;}

.banner{
  display:flex;align-items:flex-start;gap:10px;border-radius:14px;padding:12px 14px;margin-bottom:12px;
}
.banner svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;}
.banner-text{font-size:13px;font-weight:500;line-height:1.4;}
.banner.warn{background:var(--amber-tint);color:#8a5a08;}
.banner.danger{background:var(--red-tint);color:#8f2b23;}
.banner.info{background:var(--teal-tint);color:var(--teal-dark);}

.swatch{width:26px;height:26px;border-radius:8px;border:2px solid transparent;flex-shrink:0;}
.swatch.selected{border-color:var(--ink);}
.chip{
  display:inline-flex;align-items:center;padding:8px 12px;border-radius:10px;background:var(--surface-alt);
  font-size:13px;font-weight:600;border:2px solid transparent;
}
.chip.selected{border-color:var(--ink);background:var(--surface);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--border);font-size:14.5px;background:var(--surface);color:var(--ink);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:-1px;}
.field textarea{resize:vertical;min-height:118px;line-height:1.45;}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;}
.type-toggle button{
  flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:13.5px;color:var(--ink-soft);
}
.type-toggle button.active.income{border-color:var(--teal);background:var(--teal-tint);color:var(--teal-dark);}
.type-toggle button.active.expense{border-color:var(--ink);background:var(--surface-alt);color:var(--ink);}
.form-actions{display:flex;gap:8px;align-items:center;}
.form-actions .btn{flex:1;justify-content:center;}
.parse-preview{
  border:1px solid var(--border);border-radius:14px;background:var(--surface-alt);padding:12px;margin-bottom:14px;
}
.parse-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.parse-item{min-width:0;}
.parse-label{font-size:11.5px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.parse-value{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parse-message{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:10px;}
.message-box{
  white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:14px;
  background:var(--surface-alt);padding:13px;font-size:13px;line-height:1.5;color:var(--ink-soft);
}
.row-flex{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.tiny-btn{border:none;background:none;color:var(--ink-faint);padding:6px;border-radius:8px;display:flex;}
.tiny-btn:active{background:var(--surface-alt);}

/* Modal / sheet */
.overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;align-items:flex-end;justify-content:center;z-index:100;
}
.overlay.show{display:flex;}
@media (min-width:900px){.overlay{align-items:center;}}
.sheet{
  background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  animation:slideup .22s ease;
}
@media (min-width:900px){.sheet{border-radius:22px;max-height:82vh;}}
@keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sheet-title{font-family:'Space Grotesk';font-weight:700;font-size:18px;}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:18px;}
.legend{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.legend-name{flex:1;color:var(--ink-soft);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.legend-val{font-weight:600;}

.insight-card{
  border-radius:16px;padding:14px;background:var(--surface);border:1px solid var(--border);margin-bottom:10px;
  display:flex;gap:11px;align-items:flex-start;
}
.insight-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight-title{font-weight:600;font-size:13.5px;margin-bottom:3px;}
.insight-body{font-size:12.5px;color:var(--ink-soft);line-height:1.45;}

.tabbar-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:4px;}
.tabbar-scroll::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div id="print-area"></div>

<script>

/* ============ PERIOD HELPERS ============ */
function isoWeekKey(dateStr){
  const dt = new Date(dateStr+'T00:00:00');
  const target = new Date(dt.valueOf());
  const dayNr = (dt.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday = new Date(target.getFullYear(),0,4);
  const diff = target - firstThursday;
  const week = 1+Math.round(diff/(7*24*3600*1000));
  return target.getFullYear()+'-W'+String(week).padStart(2,'0');
}
function periodKey(dateStr,period){
  if(period==='weekly') return isoWeekKey(dateStr);
  if(period==='yearly') return dateStr.slice(0,4);
  return dateStr.slice(0,7);
}
function currentPeriodKey(period){ return periodKey(todayISO(),period); }
function periodLabel(key,period){
  if(period==='monthly'){
    const [y,m]=key.split('-'); return new Date(y,m-1,1).toLocaleString('en',{month:'short',year:'numeric'});
  }
  if(period==='yearly') return key;
  return key;
}
function shiftPeriodKey(period, back){
  const today = new Date();
  if(period==='monthly'){ today.setMonth(today.getMonth()-back); return today.toISOString().slice(0,7); }
  if(period==='yearly'){ today.setFullYear(today.getFullYear()-back); return String(today.getFullYear()); }
  today.setDate(today.getDate()-back*7); return isoWeekKey(today.toISOString().slice(0,10));
}
function txInPeriod(t, period, key){ return periodKey(t.date,period)===key; }

/* ============ COMPUTATION HELPERS ============ */
function catById(id){ return state.categories.find(c=>c.id===id); }
function bizById(id){ return state.businesses.find(b=>b.id===id); }
function sourceById(id){ return state.incomeSources.find(s=>s.id===id); }
function sourceLabel(source){
  if(!source) return null;
  if(source.kind==='business') return bizById(source.id)?.name;
  return sourceById(source.id)?.name;
}
function totals(txs){
  let income=0, expense=0;
  txs.forEach(t=>{ if(t.type==='income') income+=t.amount; else expense+=t.amount; });
  return {income, expense, net:income-expense};
}
function currentPeriodTx(period){
  const key = currentPeriodKey(period);
  return state.transactions.filter(t=>txInPeriod(t,period,key));
}
function categoryBreakdown(txs,type){
  const map = {};
  txs.filter(t=>t.type===type).forEach(t=>{ map[t.categoryId]=(map[t.categoryId]||0)+t.amount; });
  return Object.entries(map).map(([id,amount])=>({cat:catById(id),amount})).filter(x=>x.cat).sort((a,b)=>b.amount-a.amount);
}

function overspendWarnings(){
  const key = currentPeriodKey(ui.period);
  const txs = state.transactions.filter(t=>txInPeriod(t,ui.period,key) && t.type==='expense');
  const warnings=[];
  state.budgets.filter(b=>b.period===ui.period).forEach(b=>{
    const spent = txs.filter(t=>t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct = spent/b.amount;
    const cat = catById(b.categoryId);
    if(cat && pct>=0.9) warnings.push({cat,spent,budget:b.amount,pct,over:pct>=1});
  });
  return warnings;
}

function donutChart(breakdown,total){
  const size=140, r=52, cx=70, cy=70, circ=2*Math.PI*r;
  let offset=0;
  const segs = breakdown.map(b=>{
    const frac = b.amount/total;
    const dash = frac*circ;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${b.cat.color}" stroke-width="16" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return seg;
  }).join('');
  return `<div class="donut-wrap">
    <svg width="${size}" height="${size}" viewBox="0 0 140 140">
      ${segs}
      <text x="70" y="66" text-anchor="middle" font-size="11" fill="var(--ink-faint)" font-family="Inter">Total</text>
      <text x="70" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="var(--ink)" font-family="IBM Plex Mono">${fmt(total).replace('KES','').trim()}</text>
    </svg>
    <div class="legend">
      ${breakdown.slice(0,6).map(b=>`
        <div class="legend-item">
          <div class="legend-dot" style="background:${b.cat.color}"></div>
          <div class="legend-name">${b.cat.icon} ${b.cat.name}</div>
          <div class="legend-val mono">${Math.round(b.amount/total*100)}%</div>
        </div>`).join('')}
    </div>
  </div>`;
}

  mutate(s=>{
    if(editId){
      const t = s.transactions.find(t=>t.id===editId);
      Object.assign(t,{type,amount,categoryId,date,note,source});
    } else {
      s.transactions.push({id:uid(),type,amount,categoryId,date,note,source});
      if(type==='income') applyAutomation(s, amount, source, date);
    }
  });
  closeSheet();
  return false;
}
function applyAutomation(s, incomeAmount, source, date){
  s.automationRules.filter(r=>r.enabled).forEach(r=>{
    if(r.appliesTo!=='all' && !(source && (source.id===r.appliesTo))) return;
    const cat = s.categories.find(c=>c.id===r.categoryId);
    if(!cat) return;
    const allocAmount = Math.round(incomeAmount*(r.percent/100));
    if(allocAmount<=0) return;
    s.transactions.push({id:uid(),type:'expense',amount:allocAmount,categoryId:r.categoryId,date,note:`Auto: ${r.name}`,source:null});
  });
}

}

function parseMpesaMessage(message){
  const clean = message.replace(/\s+/g,' ').trim();
  const lower = clean.toLowerCase();
  const amountMatch = clean.match(/(?:ksh|kes)\s*([0-9][0-9,]*(?:\.\d{1,2})?)/i);
  const dateMatch = clean.match(/\bon\s+(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})(?:\s+at\s+([0-9:.]+\s*(?:am|pm)?))?/i);
  const amount = amountMatch ? parseFloat(amountMatch[1].replace(/,/g,'')) : 0;
  const date = dateMatch ? mpesaDateToISO(dateMatch) : '';
  const type = detectMpesaType(lower);
  const party = detectMpesaParty(clean, type);
  if(!amount) return {valid:false,error:'No M-Pesa amount was found in that message.'};
  if(!date) return {valid:false,error:'No transaction date was found. Please paste the full M-Pesa message with the "on day/month/year" date.'};
  if(!type) return {valid:false,error:'I found the amount, but could not tell if it is income or expense.'};
  return {
    valid:true,
    type,
    amount,
    date,
    party,
    raw:clean,
    note: mpesaNote(type, party, clean)
  };
}

function detectMpesaType(lower){
  if(/\bpaid to\b|\bsent to\b|\bwithdrawn?\b|\bbought\b|\bairtime\b|\bpay bill\b|\bbuy goods\b/.test(lower)) return 'expense';
  if(/\breceived\b|\byou have received\b/.test(lower)) return 'income';
  return null;
}

function detectMpesaParty(message, type){
  if(type==='expense' && /\bairtime\b/i.test(message)) return 'Safaricom Airtime';
  const patterns = type==='income'
    ? [/\bfrom\s+(.+?)(?:\s+\d{7,}|\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i]
    : [
        /\bpaid to\s+(.+?)(?:\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
        /\bsent to\s+(.+?)(?:\s+\d{7,}|\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
        /\bwithdrawn from\s+(.+?)(?:\s+on\s+|\.\s*New|\.\s*Your|\.\s*M-PESA|$)/i,
      ];
  for(const pattern of patterns){
    const match = message.match(pattern);
    if(match && match[1]) return cleanMpesaParty(match[1]);
  }
  return type==='income' ? 'M-Pesa sender' : 'M-Pesa recipient';
}

function cleanMpesaParty(value){
  return value
    .replace(/\baccount\s+no\.?.*$/i,'')
    .replace(/\btill\s+no\.?.*$/i,'')
    .replace(/\bbusiness\s+no\.?.*$/i,'')
    .replace(/\bfor\s*$/i,'')
    .replace(/\s+/g,' ')
    .replace(/[.,;:]+$/,'')
    .trim();
}

function mpesaDateToISO(match){
  const day = parseInt(match[1],10);
  const month = parseInt(match[2],10);
  let year = parseInt(match[3],10);
  if(year<100) year += 2000;
  if(!day || !month || month>12) return todayISO();
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function mpesaNote(type, party, raw){
  const prefix = type==='income' ? 'M-Pesa from' : 'M-Pesa to';
  return `${prefix} ${party || 'unknown'}`.slice(0,80);
}

async function shareMpesaMessage(txId){
  const tx = state.transactions.find(t=>t.id===txId);
  if(!tx?.mpesa?.message) return;
  const title = `M-Pesa ${tx.type==='income'?'income':'expense'} - ${fmt(tx.amount)}`;
  const text = tx.mpesa.message;
  try{
    if(navigator.share){
      await navigator.share({title, text});
      showMpesaShareStatus('Shared successfully.', 'info');
      return;
    }
    await copyText(text);
    showMpesaShareStatus('Sharing is not available here, so the message was copied.', 'info');
  }catch(e){
    if(e && e.name === 'AbortError') return;
    try{
      await copyText(text);
      showMpesaShareStatus('Could not open sharing, so the message was copied.', 'info');
    }catch(copyError){
      showMpesaShareStatus('Could not share automatically. You can copy the message from above.', 'danger');
    }
  }
}

async function copyText(text){
  if(navigator.clipboard?.writeText){
    await navigator.clipboard.writeText(text);
    return;
  }
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly','');
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  const ok = document.execCommand('copy');
  textarea.remove();
  if(!ok) throw new Error('Copy failed');
}

/* ============ INSIGHTS ============ */
function generateInsights(){
  const insights = [];
  const period='monthly';
  const thisKey = currentPeriodKey(period);
  const lastKey = shiftPeriodKey(period,1);

  // Overall income/expense trend
  const thisTx = state.transactions.filter(t=>txInPeriod(t,period,thisKey));
  const lastTx = state.transactions.filter(t=>txInPeriod(t,period,lastKey));
  const thisT = totals(thisTx), lastT = totals(lastTx);
  if(lastT.income>0){
    const diff = thisT.income-lastT.income;
    const pct = Math.round(Math.abs(diff)/lastT.income*100);
    if(Math.abs(pct)>=5){
      insights.push({icon:diff>=0?'up':'down',color:diff>=0?'#0D9488':'#C0362C',
        title:`Income ${diff>=0?'up':'down'} ${pct}% vs last month`,
        body:`You earned ${fmt(thisT.income)} this month compared to ${fmt(lastT.income)} last month, a ${diff>=0?'gain':'drop'} of ${fmt(Math.abs(diff))}.`});
    }
  }
  if(lastT.expense>0){
    const diff = thisT.expense-lastT.expense;
    const pct = Math.round(Math.abs(diff)/lastT.expense*100);
    if(Math.abs(pct)>=5){
      insights.push({icon:diff>=0?'up':'down',color:diff>=0?'#C0362C':'#0D9488',
        title:`Spending ${diff>=0?'up':'down'} ${pct}% vs last month`,
        body:`You spent ${fmt(thisT.expense)} this month vs ${fmt(lastT.expense)} last month.`});
    }
  }

  // Category driving the expense change
  const thisBreak = categoryBreakdown(thisTx,'expense');
  const lastBreak = categoryBreakdown(lastTx,'expense');
  let biggestDelta=null;
  thisBreak.forEach(cur=>{
    const prev = lastBreak.find(p=>p.cat.id===cur.cat.id);
    const delta = cur.amount-(prev?prev.amount:0);
    if(!biggestDelta || Math.abs(delta)>Math.abs(biggestDelta.delta)) biggestDelta={cat:cur.cat,delta};
  });
  if(biggestDelta && Math.abs(biggestDelta.delta)>0){
    insights.push({icon:biggestDelta.delta>0?'up':'down',color:biggestDelta.delta>0?'#C2760C':'#0D9488',
      title:`${biggestDelta.cat.name} moved the most`,
      body:`${biggestDelta.cat.name} ${biggestDelta.delta>0?'increased':'decreased'} by ${fmt(Math.abs(biggestDelta.delta))} compared to last month — the biggest single shift in your spending.`});
  }

  // Business comparison
  if(state.businesses.length>=1){
    const bizPerf = state.businesses.map(b=>{
      const cur = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,thisKey));
      const prev = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,lastKey));
      return {biz:b, cur:totals(cur), prev:totals(prev)};
    });
    if(bizPerf.length>=2){
      const best = [...bizPerf].sort((a,b)=>b.cur.net-a.cur.net)[0];
      const worst = [...bizPerf].sort((a,b)=>a.cur.net-b.cur.net)[0];
      if(best.biz.id!==worst.biz.id){
        insights.push({icon:'briefcase',color:'#3B6FA0',
          title:`${best.biz.name} is outperforming ${worst.biz.name}`,
          body:`${best.biz.name} netted ${fmt(best.cur.net)} this month vs ${fmt(worst.cur.net)} for ${worst.biz.name}. Consider reviewing ${worst.biz.name}'s expenses or income sources.`});
      }
    }
    bizPerf.forEach(bp=>{
      if(bp.prev.income>0 && bp.cur.income<bp.prev.income){
        const dropPct = Math.round((bp.prev.income-bp.cur.income)/bp.prev.income*100);
        if(dropPct>=10){
          const expDelta = bp.cur.expense-bp.prev.expense;
          insights.push({icon:'down',color:'#C0362C',
            title:`${bp.biz.name} earned less this month`,
            body:`Income fell ${dropPct}% (${fmt(bp.prev.income)} → ${fmt(bp.cur.income)})${expDelta>0?`, while expenses rose by ${fmt(expDelta)} — worth checking what changed.`:'. Worth a closer look at what changed this month.'}`});
        }
      }
    });
  }

  // Budget-based insight
  const warnings = overspendWarningsFor('monthly');
  warnings.forEach(w=>{
    insights.push({icon:'alert',color: w.over?'#C0362C':'#C2760C',
      title:`${w.cat.name} budget ${w.over?'exceeded':'nearly reached'}`,
      body:`You've spent ${fmt(w.spent)} of your ${fmt(w.budget)} ${w.cat.name} budget this month (${Math.round(w.pct*100)}%).`});
  });

  if(insights.length===0){
    insights.push({icon:'info',color:'#0D9488',title:'Not enough data yet',body:'Keep logging income and expenses — insights get sharper the more transactions you add.'});
  }
  return insights;
}
function overspendWarningsFor(period){
  const key = currentPeriodKey(period);
  const txs = state.transactions.filter(t=>txInPeriod(t,period,key)&&t.type==='expense');
  const warnings=[];
  state.budgets.filter(b=>b.period===period).forEach(b=>{
    const spent = txs.filter(t=>t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct = spent/b.amount;
    const cat = catById(b.categoryId);
    if(cat && pct>=0.9) warnings.push({cat,spent,budget:b.amount,pct,over:pct>=1});
  });
  return warnings;
}
function renderInsights(){
  const insights = generateInsights();
  return `
    <div class="section-title first">What's happening this month</div>
    ${insights.map(i=>`
      <div class="insight-card">

}

function buildFinancialSnapshot(){
  const allT = totals(state.transactions);
  const period = 'monthly';
  const key = currentPeriodKey(period);
  const monthTx = state.transactions.filter(t=>txInPeriod(t,period,key));
  const monthT = totals(monthTx);
  const budgetLines = state.budgets.length ? state.budgets.map(b=>{
    const cat = catById(b.categoryId);
    const spent = monthTx.filter(t=>t.type==='expense'&&t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct = b.amount>0 ? Math.round(spent/b.amount*100) : 0;
    return `${cat?cat.name:'Unknown'} (${b.period}): spent ${fmt(spent)} of ${fmt(b.amount)} budget (${pct}%)`;
  }).join('; ') : 'No budgets set';
  const targetLines = state.targets.length ? state.targets.map(tg=>`${tg.period} target ${fmt(tg.amount)} (currently at ${fmt(monthT.net)} net this month)`).join('; ') : 'No savings targets set';
  const bizLines = state.businesses.length ? state.businesses.map(b=>{
    const tx = state.transactions.filter(t=>t.source?.kind==='business'&&t.source.id===b.id&&txInPeriod(t,period,key));
    const t = totals(tx);
    return `${b.name}: income ${fmt(t.income)}, expense ${fmt(t.expense)}, net ${fmt(t.net)} this month`;
  }).join('; ') : 'No businesses tracked';
  const recentTx = [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20)
    .map(t=>`${t.date} ${t.type} ${fmt(t.amount)} — ${catById(t.categoryId)?.name||'Uncategorized'}${sourceLabel(t.source)?' via '+sourceLabel(t.source):''}${t.note?' ('+t.note+')':''}`)
    .join('\n');
  return [
    `All-time net balance: ${fmt(allT.net)} (total income ${fmt(allT.income)}, total expense ${fmt(allT.expense)}).`,
    `This month so far: income ${fmt(monthT.income)}, expenses ${fmt(monthT.expense)}, net ${fmt(monthT.net)}.`,
    `Budgets: ${budgetLines}.`,
    `Targets: ${targetLines}.`,
    `Businesses: ${bizLines}.`,
    `Recent transactions, most recent first:\n${recentTx || 'none yet'}`
  ].join('\n\n');
}

async function callGeminiAdvisor(userMessage){
  const apiKey = localStorage.getItem(AI_KEY_STORAGE);
  if(!apiKey) throw new Error('No API key saved yet. Tap "Add key" above.');
  const snapshot = buildFinancialSnapshot();
  // Gemini uses 'user' and 'model' roles (not 'assistant'), and wraps text in a parts array.
  const history = aiChat.slice(-10).map(m=>({
    role: m.role==='assistant' ? 'model' : 'user',
    parts: [{text: m.content}]
  }));
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      systemInstruction: {
        parts: [{text: `You are the financial advisor built into the user's personal "Ledger" app. All amounts are in Kenyan Shillings (KES). Base every answer strictly on the financial snapshot below — never invent numbers that aren't in it. Be direct and specific (cite real figures and category names), flag overspending against stated budgets/targets when it applies, and keep answers concise (roughly under 150 words) unless the user asks for more detail.\n\nFINANCIAL SNAPSHOT:\n${snapshot}`}]
      },
      contents: [...history, {role:'user', parts:[{text:userMessage}]}],
      generationConfig: { maxOutputTokens: 700 }
    })
  });
  if(!res.ok){
    let detail = '';
    try{ detail = (await res.json()).error?.message || ''; }catch(e){}
    if(res.status===400 && /api key/i.test(detail)) throw new Error('That API key was rejected. Double-check it in "Add key".');
    if(res.status===403) throw new Error('That API key was rejected or lacks access. Double-check it in "Add key".');
    throw new Error(detail || `Request failed (${res.status}).`);
  }
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts.map(p=>p.text||'').join('\n').trim();
  return text || "I didn't get a usable response — try again.";
}

function getExportTx(){
  const range = document.getElementById('exportRange').value;
  const bizId = document.getElementById('exportBiz').value;
  const now = new Date();
  let txs = [...state.transactions];
  if(range==='year'){
    const y = now.getFullYear();
    txs = txs.filter(t=>new Date(t.date).getFullYear()===y);
  } else if(range==='month'){
    const y = now.getFullYear(), m = now.getMonth();
    txs = txs.filter(t=>{ const d=new Date(t.date); return d.getFullYear()===y && d.getMonth()===m; });
  }
  if(bizId!=='all'){
    txs = txs.filter(t=>t.source && t.source.kind==='business' && t.source.id===bizId);
  }
  return txs.sort((a,b)=>a.date.localeCompare(b.date));
}
function triggerDownload(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function csvEscape(v){
  const s = String(v ?? '');
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;

function runExport(kind){

  }
  if(kind==='csv') exportLedgerCSV(txs);
  else exportLedgerPDF(txs);
}
function exportLedgerCSV(txs){
  const rows = [['Date','Type','Category','Business/Source','Note','Amount (KES)']];
  let balance = 0;
  txs.forEach(t=>{
    balance += t.type==='income' ? t.amount : -t.amount;
    rows.push([t.date, t.type, catById(t.categoryId)?.name||'', sourceLabel(t.source)||'', t.note||'', t.type==='income'?t.amount:-t.amount]);
  });
  const totalIncome = txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  rows.push([]);
  rows.push(['','','','','Total income', totalIncome]);
  rows.push(['','','','','Total expense', -totalExpense]);
  rows.push(['','','','','Net', totalIncome-totalExpense]);
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  triggerDownload(`ledger-${todayISO()}.csv`, csv, 'text/csv;charset=utf-8;');
  closeSheet();
}
function exportLedgerPDF(txs){
  const totalIncome = txs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const totalExpense = txs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const net = totalIncome - totalExpense;
  let balance = 0;
  const rowsHTML = txs.map(t=>{
    balance += t.type==='income' ? t.amount : -t.amount;
    const cat = catById(t.categoryId);
    const src = sourceLabel(t.source);
    return `<tr>
      <td>${escapeHTML(t.date)}</td>
      <td>${escapeHTML(cat?cat.name:'')}</td>
      <td>${escapeHTML(t.note||'')}</td>
      <td>${escapeHTML(src||'')}</td>
      <td class="amt ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</td>
      <td class="amt">${fmt(balance)}</td>
    </tr>`;
  }).join('');
  document.getElementById('print-area').innerHTML = `
    <div class="p-head">
      <div>
        <p class="p-title">Client Nest — Ledger Statement</p>
        <div class="p-sub">${txs.length} transactions · ${escapeHTML(txs[0].date)} to ${escapeHTML(txs[txs.length-1].date)}</div>
      </div>
      <div class="p-meta">Generated ${escapeHTML(todayISO())}<br>All amounts in KES</div>
    </div>
    <div class="p-summary">
      <div><div class="p-label">Total income</div><div class="p-value">${fmt(totalIncome)}</div></div>
      <div><div class="p-label">Total expense</div><div class="p-value">${fmt(totalExpense)}</div></div>
      <div><div class="p-label">Net</div><div class="p-value">${fmt(net)}</div></div>
    </div>
    <table class="p-table">
      <thead><tr><th>Date</th><th>Category</th><th>Note</th><th>Business/Source</th><th style="text-align:right;">Amount</th><th style="text-align:right;">Balance</th></tr></thead>
      <tbody>${rowsHTML}</tbody>
    </table>
    <div class="p-footer">Generated by Ledger</div>
  `;
  closeSheet();
  setTimeout(()=>window.print(), 150);
}

/* ============ SHEET / MODAL CONTROLS ============ */
function showSheet(){ document.getElementById('overlay').classList.add('show'); }
function closeSheet(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeSheet(); });

/* ============ INIT ============ */
loadTheme();
loadAIChat();
loadState();
</script>
